name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: git clone --depth=1 https://github.com/${{ github.repository }} .

      - name: Install dependencies
        run: |
          python3 -m venv /tmp/venv
          /tmp/venv/bin/pip install pygbag pygame-ce

      - name: Build with pygbag
        run: /tmp/venv/bin/pygbag --build --template template.tmpl --width 380 --height 660 --ume_block 0 --disable-sound-format-error main.py

      - name: Deploy to gh-pages
        run: |
          cd build/web
          git init
          git config user.name github-actions
          git config user.email noreply@github.com
          git add -A
          git commit -m "Deploy ${{ github.sha }}"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:refs/heads/gh-pages --force
